<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ИСТ-253</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#091828;--sf:#0d2242;--sf2:#112a50;--sf3:#16325e;--ac:#2563eb;--ac2:#3b82f6;--green:#22c55e;--text:#ffffff;--dim:#6b8fb0;--muted:#3a5570;--border:rgba(59,130,246,.18);--r:16px;--grad:none}
body.theme-purple{--bg:#120b28;--sf:#1e1040;--sf2:#271555;--sf3:#321a6e;--ac:#7c3aed;--ac2:#a78bfa;--border:rgba(124,58,237,.2);--dim:#8b7baa;--muted:#3d2d66}
body.theme-green{--bg:#091a12;--sf:#0d2a1a;--sf2:#123520;--sf3:#184228;--ac:#059669;--ac2:#34d399;--border:rgba(5,150,105,.2);--dim:#5a8a72;--muted:#1e4030}
body.theme-night{--bg:#05050f;--sf:#0d0d25;--sf2:#12122e;--sf3:#18183a;--ac:#4f46e5;--ac2:#818cf8;--border:rgba(79,70,229,.2);--dim:#6b6b9a;--muted:#24244a}
body.theme-fire{--bg:#180a0a;--sf:#2a0f0f;--sf2:#351515;--sf3:#421c1c;--ac:#dc2626;--ac2:#f87171;--border:rgba(220,38,38,.2);--dim:#8a6060;--muted:#4a2020}
body.theme-ocean{--bg:#071a1a;--sf:#0d2a2a;--sf2:#123535;--sf3:#184040;--ac:#0891b2;--ac2:#22d3ee;--border:rgba(8,145,178,.2);--dim:#507a80;--muted:#1e4040}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Golos Text',system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;position:relative;transition:background .3s}
body.has-grad::before{content:'';position:fixed;inset:0;z-index:0;background:var(--grad);opacity:.13;pointer-events:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;z-index:1}
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding-bottom:88px;opacity:0;pointer-events:none;transition:opacity .18s ease;-ms-overflow-style:none;scrollbar-width:none}
.view::-webkit-scrollbar{display:none}
.view.active{opacity:1;pointer-events:all}
/* Header */
.header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.header-date{font-size:18px;font-weight:700}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--sf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ac2);font-size:17px;transition:background .15s}
.icon-btn:active{background:var(--sf2)}
/* Day strip */
.days-strip{padding:0 16px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.days-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;width:46px;height:46px;border-radius:13px;background:var(--sf);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;position:relative;line-height:1}
.day-pill .dn{font-size:9px;font-weight:500;color:var(--dim);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.day-pill.active{background:var(--ac);border-color:transparent;color:#fff}
.day-pill.active .dn{color:rgba(255,255,255,.7)}
.day-pill.has-hw::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--green)}
.day-pill.active.has-hw::after{background:#fff}
/* Lesson cards */
.lessons-list{padding:4px 14px 8px;display:flex;flex-direction:column;gap:8px}
.lesson-card{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;transition:border-color .2s}
.lesson-card.has-hw{border-color:rgba(59,130,246,.35)}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.lc-subj{font-size:15px;font-weight:700;flex:1;line-height:1.3}
.lc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lc-time{font-size:12px;font-weight:600;color:var(--dim);white-space:nowrap}
.lc-kind{font-size:12px;color:var(--dim);margin-bottom:6px}
.lc-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.lc-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hw-toggle{width:30px;height:30px;border-radius:9px;background:var(--sf2);display:flex;align-items:center;justify-content:center;color:var(--ac2);font-size:15px;font-weight:600;transition:all .2s;flex-shrink:0}
.hw-toggle.open{background:rgba(34,197,94,.15);color:var(--green)}
.lc-hw{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.lc-hw.open{display:block}
.lc-hw-text{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.btn-primary{width:100%;padding:11px;background:var(--ac);border-radius:10px;color:#fff;font-size:13px;font-weight:600;transition:opacity .15s}
.btn-primary:active{opacity:.85}
/* Subjects */
.page-header{padding:14px 20px 10px;font-size:18px;font-weight:700}
.subj-group{margin:0 14px 8px;background:var(--sf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.subj-title{padding:13px 14px;font-size:14px;font-weight:700}
.hw-row{border-top:1px solid var(--border);padding:11px 14px}
.hw-row-top{display:flex;align-items:center;gap:10px}
.hw-row-date{font-size:14px;font-weight:700;color:var(--ac2);flex-shrink:0;min-width:38px}
.hw-row-kind{font-size:13px;color:var(--dim);flex:1}
.hw-chev{width:30px;height:30px;border-radius:9px;flex-shrink:0;background:var(--sf2);display:flex;align-items:center;justify-content:center;color:var(--ac2);font-size:15px;font-weight:600;transition:all .2s}
.hw-chev.open{background:rgba(34,197,94,.15);color:var(--green)}
.hw-row-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.hw-row-body.open{display:block}
.hw-row-task{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:10px}
.hw-empty{font-size:12px;color:var(--muted);padding:10px 0}
/* Detail */
.detail-header{padding:12px 14px 8px;display:flex;align-items:center;gap:12px}
.detail-meta{flex:1;min-width:0}
.detail-subj{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-kind{font-size:12px;color:var(--dim);margin-top:2px}
.detail-date-badge{flex-shrink:0;background:var(--sf2);border-radius:8px;padding:5px 10px;font-size:14px;font-weight:700;color:var(--ac2)}
.detail-card{margin:4px 14px 10px;background:var(--sf);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:14px;line-height:1.75}
.attachments{margin:0 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.attach-photo{border-radius:13px;overflow:hidden;aspect-ratio:1;background:var(--sf);border:1px solid var(--border)}
.attach-photo img{width:100%;height:100%;object-fit:cover;display:block}
.attach-doc{border-radius:11px;background:var(--sf);border:1px solid var(--border);padding:12px;display:flex;align-items:center;gap:10px;font-size:13px;grid-column:1/-1}
/* ═══ PROFILE ═══ */
.profile-scroll{padding:8px 14px 8px}
.profile-hero{background:var(--sf);border:1px solid var(--border);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;margin-bottom:10px;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:var(--ac);opacity:.06}
.avatar-wrap{position:relative;margin-bottom:14px;cursor:pointer}
.avatar-lg{width:82px;height:82px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid var(--ac);overflow:hidden;background:var(--sf2);transition:transform .2s}
.avatar-lg:active{transform:scale(.95)}
.avatar-lg img{width:100%;height:100%;object-fit:cover}
.av-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--bg)}
.profile-name{font-size:18px;font-weight:700;margin-bottom:4px;text-align:center}
.profile-uname{font-size:13px;color:var(--dim);margin-bottom:14px}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chip{padding:5px 12px;border-radius:20px;background:var(--sf2);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--ac2)}
.s-section{margin-bottom:10px}
.s-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin:0 4px 8px;display:block}
.s-card{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--border)}
.s-row:last-child{border-bottom:none}
.s-row-lbl{font-size:14px;font-weight:500}
.s-row-val{font-size:13px;color:var(--dim)}
.sg-toggle{display:flex;gap:6px}
.sg-btn{width:36px;height:36px;border-radius:10px;background:var(--sf2);border:1px solid var(--border);font-size:14px;font-weight:700;color:var(--dim);display:flex;align-items:center;justify-content:center;transition:all .18s}
.sg-btn.active{background:var(--ac);border-color:transparent;color:#fff}
/* Theme grid */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.th-opt{border-radius:12px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .18s;aspect-ratio:1.8;position:relative}
.th-opt.active{border-color:var(--ac)}
.th-preview{width:100%;height:100%}
.th-name{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:10px;font-weight:700;text-align:center;background:rgba(0,0,0,.5)}
.th-check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--ac);display:none;align-items:center;justify-content:center;font-size:10px}
.th-opt.active .th-check{display:flex}
/* Avatar grid */
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px}
.av-opt{width:100%;aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:2px solid transparent;background:var(--sf2);transition:all .18s}
.av-opt.active{border-color:var(--ac)}
.av-opt.is-grad{font-size:13px;font-weight:700;color:#fff}
/* BG grid */
.bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.bg-opt{aspect-ratio:1.6;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .18s;position:relative;overflow:hidden}
.bg-opt.active{border-color:var(--ac)}
.bg-none-lbl{background:var(--sf2);display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:11px;font-weight:600;color:var(--dim)}
/* Nav avatar */
.nav-avatar{width:50px;height:50px;border-radius:14px;background:var(--sf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--dim);flex-shrink:0;cursor:pointer;overflow:hidden;transition:border-color .18s}
.nav-avatar.on{border-color:var(--ac)}
.nav-av-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px}
/* Calendar */
.cal-overlay{position:fixed;inset:0;z-index:200;background:rgba(5,15,30,.72);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;padding-top:90px}
.cal-overlay.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cal-modal{background:var(--sf);border:1px solid var(--border);border-radius:20px;padding:16px;width:calc(100% - 28px);max-width:370px;animation:slideDown .2s ease}
@keyframes slideDown{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-m-lbl{font-size:15px;font-weight:700}
.cal-nav-btn{width:32px;height:32px;border-radius:9px;background:var(--sf2);color:var(--ac2);font-size:18px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dn{text-align:center;font-size:10px;font-weight:600;color:var(--dim);padding:4px 0 6px;letter-spacing:.4px}
.cal-day{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:background .12s}
.cal-day:active{background:var(--sf3)}
.cal-day.other{color:var(--muted)}
.cal-day.today{border:1px solid var(--ac2)}
.cal-day.selected{background:var(--ac);color:#fff}
.cal-day.has-lessons{position:relative}
.cal-day.has-lessons::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--green)}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:8px 14px max(20px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);display:flex;align-items:center;gap:8px;z-index:100}
.nav-tabs{flex:1;background:var(--sf);border:1px solid var(--border);border-radius:15px;padding:4px;display:flex;gap:4px}
.nav-tab{flex:1;padding:10px 8px;border-radius:11px;background:none;color:var(--dim);font-size:13px;font-weight:600;transition:all .18s}
.nav-tab.active{background:var(--ac);color:#fff}
/* States */
.empty{text-align:center;padding:52px 24px;color:var(--dim)}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty-txt{font-size:14px;line-height:1.6}
.loader{display:flex;align-items:center;justify-content:center;padding:52px 24px;gap:12px;color:var(--dim);font-size:14px}
.spinner{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--muted);border-top-color:var(--ac);animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

  <div class="views">

        <div class="header-date" id="headerDate">–</div>

            </div>
            <div class="s-row"><span class="s-row-lbl">Группа</span><span class="s-row-val">ИСТ-253</span></div>

          </div>
        </div>

        <div class="s-section">
          <span class="s-label">Тема</span>
          <div class="s-card"><div class="theme-grid" id="themeGrid"></div></div>
        </div>

        <div class="s-section">
          <span class="s-label">Фон</span>
          <div class="s-card"><div class="bg-grid" id="bgGrid"></div></div>
        </div>

        <div class="s-section" id="avSection">
          <span class="s-label">Аватар</span>
          <div class="s-card"><div class="av-grid" id="avGrid"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="schedule">Расписание</button>
      <button class="nav-tab" data-view="subjects">Предметы</button>
    </div>
    <div class="nav-avatar" id="navAv" onclick="goView('profile')">
      <div class="nav-av-inner" id="navAvIn">👤</div>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div class="cal-overlay" id="calOverlay">
  <div class="cal-modal">
    <div class="cal-head">
      <button class="cal-nav-btn" id="calPrev">‹</button>
      <div class="cal-m-lbl" id="calMLbl"></div>
      <button class="cal-nav-btn" id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- SUBGROUP FIRST-LAUNCH -->

  <div class="cal-modal" style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">👋</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px">Выбери подгруппу</div>

    </div>
  </div>
</div>

const EMOJIS=[
  {id:'fox','v':'🦊'},{id:'wolf','v':'🐺'},{id:'lion','v':'🦁'},
  {id:'bear','v':'🐻'},{id:'panda','v':'🐼'},{id:'eagle','v':'🦅'},
  {id:'dragon','v':'🐉'},{id:'robot','v':'🤖'},{id:'alien','v':'👾'},
  {id:'cat','v':'🐱'},{id:'fire','v':'🔥'},{id:'bolt','v':'⚡'},
];
const GRADS=[
  {id:'g1',bg:'linear-gradient(135deg,#667eea,#764ba2)'},
  {id:'g2',bg:'linear-gradient(135deg,#f093fb,#f5576c)'},
  {id:'g3',bg:'linear-gradient(135deg,#4facfe,#00f2fe)'},
  {id:'g4',bg:'linear-gradient(135deg,#43e97b,#38f9d7)'},
  {id:'g5',bg:'linear-gradient(135deg,#fa709a,#fee140)'},
  {id:'g6',bg:'linear-gradient(135deg,#a18cd1,#fbc2eb)'},
];

const S={
  date:new Date(),view:'schedule',prevView:'schedule',
  cache:{},hw:[],calDate:new Date(),
  subgroup:localStorage.getItem('subgroup')||null,
  theme:localStorage.getItem('theme')||'default',
  bgGrad:localStorage.getItem('bgGrad')||'none',
  avatar:localStorage.getItem('avatar')||null,
  tgUser:null,dbUser:null,
};

const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DNAMES=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const PROXY='https://corsproxy.io/?';

// ── INIT ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',async()=>{
  if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();S.tgUser=Telegram.WebApp.initDataUnsafe?.user||null;}
  applyTheme(S.theme,false);
  applyBg(S.bgGrad,false);
  buildThemeGrid();buildBgGrid();buildAvGrid();
  await loadUserFromSupabase();
  syncProfileUI();
  bindNav();bindCalendar();
  if(!S.subgroup) document.getElementById('sgOvl').classList.add('open');
  await loadHW();
  renderStrip();
  await loadWeekAndRender(S.date);
});

// ── USER SYNC ─────────────────────────────────────────────
async function loadUserFromSupabase(){
  if(!CFG.SUPABASE_KEY||!S.tgUser?.id) return;
  try{
    const r=await fetch(`${CFG.SUPABASE_URL}/rest/v1/users?user_id=eq.${S.tgUser.id}&select=*`,
      {headers:{apikey:CFG.SUPABASE_KEY,Authorization:`Bearer ${CFG.SUPABASE_KEY}`}});
    const d=await r.json();
    if(d?.length){
      S.dbUser=d[0];
      if(S.dbUser.subgroup&&!S.subgroup){
        S.subgroup=S.dbUser.subgroup;
        localStorage.setItem('subgroup',S.subgroup);
        document.getElementById('sgOvl').classList.remove('open');
      }
    }
  }catch(e){console.warn('sync err',e);}
}

async function saveSubgroupToDB(sg){
  if(!CFG.SUPABASE_KEY||!S.tgUser?.id) return;
  try{
    await fetch(`${CFG.SUPABASE_URL}/rest/v1/users?user_id=eq.${S.tgUser.id}`,{
      method:'PATCH',
      headers:{apikey:CFG.SUPABASE_KEY,Authorization:`Bearer ${CFG.SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({subgroup:sg})
    });
  }catch(e){console.warn('save subgroup err',e);}
}

// ── PROFILE UI ────────────────────────────────────────────
function syncProfileUI(){
  const name=S.dbUser?.first_name||S.tgUser?.first_name||'Пользователь';
  const uname=S.tgUser?.username?`@${S.tgUser.username}`:(S.dbUser?.username?`@${S.dbUser.username}`:'');
  document.getElementById('pName').textContent=name;
  document.getElementById('pUname').textContent=uname;
  document.getElementById('pTgVal').textContent=uname||'не подключён';
  const sg=S.subgroup||S.dbUser?.subgroup||'–';
  document.getElementById('pSgChip').textContent=`Подгруппа: ${sg}`;
  document.getElementById('sg1').classList.toggle('active',sg==='1');
  document.getElementById('sg2').classList.toggle('active',sg==='2');
  renderAvatar();
}

function initials(){
  const name=document.getElementById('pName').textContent||'?';
  return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'??';
}

function renderAvatar(){
  const av=S.avatar;
  let html='';
  if(!av){
    const p=S.tgUser?.photo_url;
    html=p?`<img src="${p}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:'👤';
  } else {
    const em=EMOJIS.find(e=>e.id===av);
    const gr=GRADS.find(g=>g.id===av);
    if(em) html=em.v;
    else if(gr) html=`<div style="width:100%;height:100%;background:${gr.bg};display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff">${initials()}</div>`;
    else html='👤';
  }
  document.getElementById('avContent').innerHTML=html;
  document.getElementById('navAvIn').innerHTML=html;
}

// ── THEME ─────────────────────────────────────────────────
function applyTheme(id,save=true){
  THEMES.forEach(t=>document.body.classList.remove(`theme-${t.id}`));
  if(id!=='default') document.body.classList.add(`theme-${id}`);
  S.theme=id;
  if(save) localStorage.setItem('theme',id);
}

function applyBg(id,save=true){
  S.bgGrad=id;
  if(save) localStorage.setItem('bgGrad',id);
  if(id==='none'){document.body.classList.remove('has-grad');document.body.style.removeProperty('--grad');}
  else{const b=BGRADS.find(b=>b.id===id);if(b){document.body.style.setProperty('--grad',b.g);document.body.classList.add('has-grad');}}
}

function buildThemeGrid(){
  const g=document.getElementById('themeGrid');
  THEMES.forEach(t=>{
    const el=document.createElement('div');
    el.className='th-opt'+(S.theme===t.id?' active':'');
    el.innerHTML=`<svg class="th-preview" viewBox="0 0 80 45" preserveAspectRatio="none">
      <rect width="80" height="45" fill="${t.c[0]}"/>
      <rect y="10" width="80" height="25" rx="4" fill="${t.c[1]}"/>
      <rect x="8" y="16" width="30" height="4" rx="2" fill="${t.c[2]}"/>
      <rect x="8" y="24" width="20" height="3" rx="2" fill="${t.c[2]}" opacity=".5"/>
    </svg><div class="th-name">${t.name}</div><div class="th-check">✓</div>`;
    el.onclick=()=>{applyTheme(t.id);document.querySelectorAll('.th-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');};
    g.appendChild(el);
  });
}

function buildBgGrid(){
  const g=document.getElementById('bgGrid');
  BGRADS.forEach(b=>{
    const el=document.createElement('div');
    el.className='bg-opt'+(S.bgGrad===b.id?' active':'');
    if(b.id==='none') el.innerHTML=`<div class="bg-none-lbl">Нет</div>`;
    else el.style.background=b.g;
    el.onclick=()=>{applyBg(b.id);document.querySelectorAll('.bg-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');};
    g.appendChild(el);
  });
}

function buildAvGrid(){
  const g=document.getElementById('avGrid');
  EMOJIS.forEach(a=>{
    const el=document.createElement('div');
    el.className='av-opt'+(S.avatar===a.id?' active':'');
    el.textContent=a.v;
    el.onclick=()=>pickAv(a.id,el);
    g.appendChild(el);
  });
  const ini=initials();
  GRADS.forEach(a=>{
    const el=document.createElement('div');
    el.className='av-opt is-grad'+(S.avatar===a.id?' active':'');
    el.style.background=a.bg;
    el.style.borderRadius='12px';
    el.textContent=ini;
    el.onclick=()=>pickAv(a.id,el);
    g.appendChild(el);
  });
}

function pickAv(id,el){
  S.avatar=id;localStorage.setItem('avatar',id);
  document.querySelectorAll('.av-opt').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  renderAvatar();
}

function scrollToAvatars(){
  document.getElementById('view-profile').scrollTo({top:document.getElementById('avSection').offsetTop-50,behavior:'smooth'});
}

// ── SUBGROUP ──────────────────────────────────────────────
function setSubgroup(sg){
  S.subgroup=sg;localStorage.setItem('subgroup',sg);
  document.getElementById('sgOvl').classList.remove('open');
  document.getElementById('pSgChip').textContent=`Подгруппа: ${sg}`;
  document.getElementById('sg1').classList.toggle('active',sg==='1');
  document.getElementById('sg2').classList.toggle('active',sg==='2');
  saveSubgroupToDB(sg);
  renderStrip();renderLessons(S.date);
}

function filterSG(lessons){
  if(!S.subgroup) return lessons;
  const other=S.subgroup==='1'?'/2':'/1';
  return lessons.filter(l=>!l.discipline||!l.discipline.includes(other));
}

// ── NAV ───────────────────────────────────────────────────
function bindNav(){
  document.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>goView(b.dataset.view)));
  document.getElementById('backBtn').addEventListener('click',()=>goView(S.prevView));
}

function goView(name){
  if(name==='detail') S.prevView=S.view;
  S.view=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.view===name));
  document.getElementById('navAv').classList.toggle('on',name==='profile');
  document.querySelector('.bottom-nav').style.display=name==='detail'?'none':'';
  if(name==='subjects') renderSubjects();
  if(name==='profile'){syncProfileUI();}
}

// ── HELPERS ───────────────────────────────────────────────
const key=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const pad=n=>String(n).padStart(2,'0');
const fmtD=d=>`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
const fmtA=d=>`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;

function weekOf(d){
  const c=new Date(d),dow=c.getDay()||7;
  c.setDate(c.getDate()-dow+1);
  const mon=new Date(c),sun=new Date(c);sun.setDate(c.getDate()+6);
  return{mon,sun};
}

// ── SCHEDULE ──────────────────────────────────────────────
async function fetchWeek(mon,sun){
  const url=`https://rasp.omgtu.ru/api/schedule/group/${CFG.GROUP_ID}?start=${fmtA(mon)}&finish=${fmtA(sun)}&lng=1`;
  for(const src of[PROXY+encodeURIComponent(url),url]){
    try{const r=await fetch(src,{headers:{Accept:'application/json'}});if(r.ok) return await r.json();}catch{}
  }
  return[];
}

async function loadWeekAndRender(date){
  const k=key(date);
  if(!S.cache[k]){
    document.getElementById('lessonsList').innerHTML='<div class="loader"><div class="spinner"></div>Загрузка расписания...</div>';
    const{mon,sun}=weekOf(date);
    const lessons=await fetchWeek(mon,sun);
    lessons.forEach(l=>{const dk=l.date?l.date.replace(/\./g,'-'):'';if(dk){if(!S.cache[dk])S.cache[dk]=[];S.cache[dk].push(l);}});
    for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);if(!S.cache[key(d)])S.cache[key(d)]=[];}
  }
  renderLessons(date);renderStrip();
}

// ── HW ────────────────────────────────────────────────────
async function loadHW(){
  if(!CFG.SUPABASE_KEY) return;
  try{
    const r=await fetch(`${CFG.SUPABASE_URL}/rest/v1/homeworks?select=*&order=date_for.asc`,
      {headers:{apikey:CFG.SUPABASE_KEY,Authorization:`Bearer ${CFG.SUPABASE_KEY}`}});
    if(r.ok) S.hw=await r.json();
  }catch(e){console.warn('hw err',e);}
}

function hwFor(subj){return S.hw.filter(h=>fuzzy(h.subject,subj));}

function fuzzy(a,b){
  if(!a||!b) return false;
  const n=s=>s.toLowerCase().replace(/ё/g,'е').replace(/\s+/g,' ').trim();
  const na=n(a),nb=n(b);
  if(na===nb) return true;
  if(na.includes(nb)||nb.includes(na)) return true;
  const wa=na.split(' '),wb=nb.split(' ');
  return wa[0]&&wb[0]&&wa[0]===wb[0]&&wa[0].length>4;
}

// ── STRIP ─────────────────────────────────────────────────
function renderStrip(){
  const{mon}=weekOf(S.date);
  const strip=document.getElementById('daysStrip');strip.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const dk=key(d),isAct=dk===key(S.date);
    const filtered=filterSG(S.cache[dk]||[]);
    const hasHW=filtered.some(l=>hwFor(l.discipline).length>0);
    const pill=document.createElement('div');
    pill.className='day-pill'+(isAct?' active':'')+(hasHW?' has-hw':'');
    pill.innerHTML=`<span>${d.getDate()}</span><span class="dn">${DNAMES[i]}</span>`;
    pill.onclick=()=>pickDay(new Date(d));
    strip.appendChild(pill);
    if(isAct) setTimeout(()=>pill.scrollIntoView({inline:'center',behavior:'smooth'}),30);
  }
  document.getElementById('headerDate').textContent=fmtD(S.date);
}

async function pickDay(d){S.date=d;renderStrip();await loadWeekAndRender(d);}

// ── LESSONS ───────────────────────────────────────────────
function renderLessons(date){
  const lessons=filterSG(S.cache[key(date)]||[]);
  const el=document.getElementById('lessonsList');
  if(!lessons.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🎉</div><div class="empty-txt">Занятий нет —<br>можно отдохнуть!</div></div>`;return;}
  el.innerHTML='';
  lessons.forEach(l=>{
    const hws=hwFor(l.discipline),hw0=hws[0];
    const card=document.createElement('div');card.className='lesson-card'+(hw0?' has-hw':'');
    card.innerHTML=`
      <div class="lc-top">
        <div class="lc-subj">${l.discipline||'—'}</div>
        <div class="lc-right">
          <div class="lc-time">${l.beginLesson||''}–${l.endLesson||''}</div>
          ${hw0?`<button class="hw-toggle">›</button>`:''}
        </div>
      </div>
      <div class="lc-kind">${l.kindOfWork||''}</div>
      <div class="lc-meta">
        ${l.lecturer?`<span>${l.lecturer}</span>`:''}
        ${l.lecturer&&l.auditorium?`<span class="lc-dot"></span>`:''}
        ${l.auditorium?`<span>${l.auditorium}${l.building?' '+l.building:''}</span>`:''}
      </div>
      ${hw0?`<div class="lc-hw">
        <div class="lc-hw-text">${esc(hw0.task||'')}</div>
        <button class="btn-primary">Посмотреть полностью</button>
      </div>`:''}`;
    if(hw0){
      const tog=card.querySelector('.hw-toggle'),sec=card.querySelector('.lc-hw');
      tog.onclick=()=>{const o=sec.classList.toggle('open');tog.classList.toggle('open',o);tog.textContent=o?'✓':'›';};
      card.querySelector('.btn-primary').onclick=()=>openDetail(hw0,l);
    }
    el.appendChild(card);
  });
}

// ── SUBJECTS ──────────────────────────────────────────────
function renderSubjects(){
  const el=document.getElementById('subjectsList');
  const all=filterSG(Object.values(S.cache).flat());
  const seen=new Set(),subjects=[];
  all.forEach(l=>{if(l.discipline&&!seen.has(l.discipline)){seen.add(l.discipline);subjects.push(l.discipline);}});
  if(!subjects.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📚</div><div class="empty-txt">Открой расписание —<br>здесь появятся предметы</div></div>`;return;}
  el.innerHTML='';
  subjects.forEach(subj=>{
    const hws=hwFor(subj);
    const group=document.createElement('div');group.className='subj-group';
    let rows='';
    if(!hws.length) rows=`<div class="hw-row"><div class="hw-empty">Домашних заданий нет</div></div>`;
    else hws.forEach((hw,i)=>{
      const d=new Date(hw.date_for),ds=`${pad(d.getDate())}.${pad(d.getMonth()+1)}`;
      const m=(S.cache[hw.date_for]||[]).find(l=>fuzzy(l.discipline,subj));
      rows+=`<div class="hw-row" data-i="${i}">
        <div class="hw-row-top">
          <span class="hw-row-date">${ds}</span>
          <span class="hw-row-kind">${m?.kindOfWork||''}</span>
          <button class="hw-chev">›</button>
        </div>
        <div class="hw-row-body">
          <div class="hw-row-task">${esc(hw.task||'')}</div>
          <button class="btn-primary">Посмотреть полностью</button>
        </div>
      </div>`;
    });
    group.innerHTML=`<div class="subj-title">${subj}</div>${rows}`;
    group.querySelectorAll('.hw-chev').forEach(btn=>{
      btn.onclick=()=>{const b=btn.closest('.hw-row').querySelector('.hw-row-body');const o=b.classList.toggle('open');btn.classList.toggle('open',o);btn.textContent=o?'✓':'›';};
    });
    group.querySelectorAll('.btn-primary').forEach((btn,i)=>{
      btn.onclick=()=>{const hw=hws[i];if(!hw)return;const m=(S.cache[hw.date_for]||[]).find(l=>fuzzy(l.discipline,subj));openDetail(hw,m||null);};
    });
    el.appendChild(group);
  });
}

// ── DETAIL ────────────────────────────────────────────────
function openDetail(hw,lesson){
  document.getElementById('detailSubj').textContent=hw.subject||lesson?.discipline||'';
  document.getElementById('detailKind').textContent=lesson?.kindOfWork||'';
  const d=new Date(hw.date_for);
  document.getElementById('detailDate').textContent=`${pad(d.getDate())}.${pad(d.getMonth()+1)}`;
  document.getElementById('detailBody').textContent=hw.task||'';
  renderAttachments(hw);
  goView('detail');
}

async function renderAttachments(hw){
  const el=document.getElementById('attachments');el.innerHTML='';
  let files=[];
  try{if(hw.attachment_file_id)files=JSON.parse(hw.attachment_file_id);}catch{}
  if(!files.length) return;
  for(const f of files){
    if(f.type==='photo'&&CFG.BOT_TOKEN){
      try{
        const r=await fetch(`https://api.telegram.org/bot${CFG.BOT_TOKEN}/getFile?file_id=${f.file_id}`);
        const j=await r.json();
        if(j.ok){const div=document.createElement('div');div.className='attach-photo';div.innerHTML=`<img src="https://api.telegram.org/file/bot${CFG.BOT_TOKEN}/${j.result.file_path}" alt="">`;el.appendChild(div);}
      }catch{}
    } else if(f.type==='document'){
      const div=document.createElement('div');div.className='attach-doc';
      div.innerHTML=`<span style="font-size:22px">📄</span><span>${f.file_name||'Документ'}</span>`;
      el.appendChild(div);
    }
  }
}

// ── CALENDAR ──────────────────────────────────────────────
function bindCalendar(){
  document.getElementById('calBtn').onclick=openCal;
  document.getElementById('calOverlay').onclick=e=>{if(e.target===e.currentTarget)closeCal();};
  document.getElementById('calPrev').onclick=()=>{S.calDate.setMonth(S.calDate.getMonth()-1);drawCal();};
  document.getElementById('calNext').onclick=()=>{S.calDate.setMonth(S.calDate.getMonth()+1);drawCal();};
}
function openCal(){S.calDate=new Date(S.date);drawCal();document.getElementById('calOverlay').classList.add('open');}
function closeCal(){document.getElementById('calOverlay').classList.remove('open');}

function drawCal(){
  const d=S.calDate,today=key(new Date());
  document.getElementById('calMLbl').textContent=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const g=document.getElementById('calGrid');g.innerHTML='';
  DNAMES.forEach(n=>{const c=document.createElement('div');c.className='cal-dn';c.textContent=n;g.appendChild(c);});
  const first=new Date(d.getFullYear(),d.getMonth(),1);
  const last=new Date(d.getFullYear(),d.getMonth()+1,0);
  let sdow=first.getDay()||7;
  for(let i=sdow-1;i>0;i--){const pd=new Date(first);pd.setDate(first.getDate()-i);addCalCell(g,pd,true,today);}
  for(let i=1;i<=last.getDate();i++) addCalCell(g,new Date(d.getFullYear(),d.getMonth(),i),false,today);
  const total=g.querySelectorAll('.cal-day').length;
  for(let i=1;i<=42-total;i++){const pd=new Date(last);pd.setDate(last.getDate()+i);addCalCell(g,pd,true,today);}
}

function addCalCell(g,date,other,today){
  const dk=key(date),sel=dk===key(S.date),tod=dk===today;
  const less=filterSG(S.cache[dk]||[]).length>0;
  const c=document.createElement('div');
  c.className='cal-day'+(other?' other':'')+(tod?' today':'')+(sel?' selected':'')+(less?' has-lessons':'');
  c.textContent=date.getDate();
  c.onclick=async()=>{closeCal();await pickDay(new Date(date));};
  g.appendChild(c);
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
